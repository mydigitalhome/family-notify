<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>แจ้งลูก</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f7fb;
    }

    .container {
      width: 100%;
      max-width: 500px;
      padding: 24px;
    }

    .main-button {
      width: 100%;
      height: 280px;
      border: none;
      border-radius: 32px;
      background: #22c55e;
      color: white;
      font-size: 42px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      transition: transform 0.15s ease;
    }

    .main-button:active {
      transform: scale(0.98);
    }

    .status {
      margin-top: 24px;
      text-align: center;
      font-size: 28px;
      color: #333;
      min-height: 40px;
    }

    .small {
      margin-top: 10px;
      font-size: 18px;
      color: #666;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <button class="main-button" id="notifyButton">
      ✅<br>
      เสร็จแล้ว
    </button>

    <div class="status" id="status"></div>
    <div class="small">แตะครั้งเดียวเพื่อแจ้งลูก</div>
  </div>

  <script>
    const button = document.getElementById('notifyButton');
    const statusText = document.getElementById('status');

    // ใส่ Webhook URL ของคุณตรงนี้
    const WEBHOOK_URL = 'https://hook.us2.make.com/88367jpln66uy6xcggx3jmrpq6ottcaz';

    async function sendNotification() {
      button.disabled = true;
      statusText.innerText = 'กำลังส่ง...';

      try {
        let locationText = 'ไม่พบตำแหน่ง';

        // ขอ location
        if (navigator.geolocation) {
          const position = await new Promise((resolve, reject) => {
            navigator.geolocation.getCurrentPosition(resolve, reject, {
              enableHighAccuracy: true,
              timeout: 5000
            });
          }).catch(() => null);

          if (position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            locationText = `https://maps.google.com/?q=${lat},${lng}`;
          }
        }

        const now = new Date().toLocaleString('th-TH');

        const payload = {
          message: `พ่อเสร็จธุระแล้ว\nเวลา: ${now}\nตำแหน่ง: ${locationText}`
        };

        await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        // สั่นเครื่อง (ถ้ารองรับ)
        if (navigator.vibrate) {
          navigator.vibrate(200);
        }

        statusText.innerText = 'ส่งแล้ว ✓';

        // อ่านเสียง
        const speech = new SpeechSynthesisUtterance('ส่งข้อความแล้ว');
        speech.lang = 'th-TH';
        window.speechSynthesis.speak(speech);

      } catch (error) {
        console.error(error);
        statusText.innerText = 'ส่งไม่สำเร็จ';
      }

      setTimeout(() => {
        button.disabled = false;
      }, 2000);
    }

    button.addEventListener('click', sendNotification);
  </script>
</body>
</html>
